{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil-square"></i> Edit Bug #{{ bug.id }}</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control" 
                       value="{{ bug.title }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Module</label>
                <input type="text" name="module" class="form-control" 
                       value="{{ bug.module or '' }}"
                       placeholder="e.g. Login, Dashboard, API...">
                <div class="form-text">Used to detect duplicate bugs.</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4"
                          placeholder="Steps to reproduce, actual vs expected...">{{ bug.description or '' }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Severity <span class="text-danger">*</span></label>
                <select name="severity" class="form-select" required>
                    {% for s in severities %}
                        <option value="{{ s }}" {% if bug.severity == s %}selected{% endif %}>
                            {{ s }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-link-45deg"></i> Link to Test Case (Optional)
                </label>
                <select name="test_case_id" class="form-select">
                    <option value="">-- No Link --</option>
                    {% for tc in test_cases %}
                        <option value="{{ tc.id }}" {% if bug.test_case_id == tc.id %}selected{% endif %}>
                            #{{ tc.id }} - {{ tc.title }}
                        </option>
                    {% endfor %}
                </select>
                <div class="form-text">
                    <i class="bi bi-info-circle"></i> 
                    Select a test case to link this bug to it for traceability.
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Save Changes
                </button>
                <a href="{{ url_for('bugs.view_bug', bug_id=bug.id) }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
