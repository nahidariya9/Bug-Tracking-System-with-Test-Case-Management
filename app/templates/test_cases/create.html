{% extends "base.html" %}
{% block content %}
<h2>📋 New Test Case</h2>
<hr>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Title <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="Steps to reproduce or test steps..."></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Expected Result <span class="text-danger">*</span></label>
        <input type="text" name="expected" class="form-control"
               placeholder="What should happen?" required>
    </div>

    <button type="submit" class="btn btn-primary">Save Test Case</button>
    <a href="{{ url_for('test_cases.list_test_cases') }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
