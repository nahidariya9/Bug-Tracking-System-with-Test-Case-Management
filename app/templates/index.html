{% extends "base.html" %}
{% block content %}
<div class="text-center mt-5">
    <div class="mb-4">
        <i class="bi bi-bug-fill" style="font-size: 4rem; color: var(--primary-color);"></i>
    </div>
    <h1 class="display-4 fw-bold mb-5">Bug Tracker & Test Case Manager</h1>
    
    <div class="row justify-content-center g-4 mt-5">
        <div class="col-md-6 col-lg-3">
            <a href="/bugs" class="text-decoration-none">
                <div class="stat-card text-center" style="border-top: 4px solid var(--danger-color);">
                    <i class="bi bi-bug icon" style="color: var(--danger-color);"></i>
                    <h5 class="fw-bold">Bugs</h5>
                    <p>Track and manage bugs</p>
                </div>
            </a>
        </div>
        <div class="col-md-6 col-lg-3">
            <a href="/test-cases" class="text-decoration-none">
                <div class="stat-card text-center" style="border-top: 4px solid var(--primary-color);">
                    <i class="bi bi-clipboard-check icon" style="color: var(--primary-color);"></i>
                    <h5 class="fw-bold">Test Cases</h5>
                    <p>Create and organize tests</p>
                </div>
            </a>
        </div>
        <div class="col-md-6 col-lg-3">
            <a href="/executions" class="text-decoration-none">
                <div class="stat-card text-center" style="border-top: 4px solid var(--success-color);">
                    <i class="bi bi-play-circle icon" style="color: var(--success-color);"></i>
                    <h5 class="fw-bold">Executions</h5>
                    <p>Run and record tests</p>
                </div>
            </a>
        </div>
        <div class="col-md-6 col-lg-3">
            <a href="/reports" class="text-decoration-none">
                <div class="stat-card text-center" style="border-top: 4px solid var(--warning-color);">
                    <i class="bi bi-graph-up icon" style="color: var(--warning-color);"></i>
                    <h5 class="fw-bold">Reports</h5>
                    <p>View analytics dashboard</p>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
